# GreenVRP Engine — Nginx 反向代理配置
# 使用方法：
#   1. 将 server_name 替换为实际域名
#   2. 确保 API 服务运行在 localhost:8000
#   3. 将本文件链接到 sites-enabled/ 并重启 nginx

upstream greenvrp_api {
    server localhost:8000;
    # 多实例扩展（水平扩展时取消注释）
    # server localhost:8001;
    # server localhost:8002;
}

server {
    listen 80;
    server_name greenvrp.example.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name greenvrp.example.com;

    # SSL 证书配置（使用 certbot 或 Let's Encrypt）
    ssl_certificate     /etc/ssl/certs/greenvrp.crt;
    ssl_certificate_key /etc/ssl/private/greenvrp.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 请求体大小限制
    client_max_body_size 100M;

    # Gzip 压缩
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # 日志
    access_log /var/log/nginx/greenvrp_access.log;
    error_log  /var/log/nginx/greenvrp_error.log;

    # API 反向代理
    location / {
        proxy_pass http://greenvrp_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如需）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置（求解器可能耗时较长）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 健康检查端点（不记录日志）
    location /api/v1/health {
        access_log off;
        proxy_pass http://greenvrp_api;
        proxy_read_timeout 5s;
    }
}
