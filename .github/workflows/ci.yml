name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Security audit with pip-audit
        run: |
          pip-audit --requirement requirements.txt --requirement requirements-test.txt --ignore-vuln PYSEC-2022-430 2>&1 | tail -20

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --statistics

      - name: SAST with bandit
        run: |
          bandit -r api/ config/ core/ -ll -q -s B101

      - name: Container security scan with Trivy
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          format: 'table'
          exit-code: '1'
          skip-dirs: 'tests,.git,.venv,__pycache__'
        continue-on-error: true

      - name: Test with pytest
        run: |
          python -m pytest tests/ -q --tb=short --timeout=60 -p no:cacheprovider

      - name: Coverage report
        run: |
          pip install pytest-cov
          python -m pytest tests/ --cov=. --cov-report=term --tb=short -q --no-header --timeout=60 -p no:cacheprovider
